# Unit tests for libs_daw components

# Common template for libs_daw tests
.libs_daw_test_template: &libs_daw_test
  image: python:3.12
  stage: test
  before_script:
    - pip install -r requirements.txt
    - export PYTHONPATH="$PWD:$PYTHONPATH"

# Test DataLoader component
test_data_loader:
  <<: *libs_daw_test
  script:
    - echo "Testing DataLoader..."
    - pytest tests/test_data_loader.py --cov=libs_daw.data_loader --cov-report=term
  coverage: '/TOTAL.*\s+(\d+%)$/'

